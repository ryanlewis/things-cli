version: 2

project_name: things-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: things
    main: ./cmd/things
    binary: things
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: things
    name_template: "things_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github-native

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    {{ readFile (printf ".github/releases/%s.md" .Tag) }}

    ---

homebrew_casks:
  - name: things
    binaries:
      - things
    repository:
      owner: ryanlewis
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/ryanlewis/things-cli
    description: Manage your Things3 to-dos from the terminal.
    url:
      verified: github.com/ryanlewis/things-cli/
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(brew): {{ .ProjectName }} {{ .Tag }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/things"]
          end
