version: 2

project_name: things-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: things
    main: ./cmd/things
    binary: things
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: things
    name_template: "things_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github-native

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    {{ readFile (printf ".github/releases/%s.md" .Tag) }}
    ---
