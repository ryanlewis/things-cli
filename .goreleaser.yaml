version: 2

project_name: things-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: things
    main: ./cmd/things
    binary: things
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: things
    name_template: "things_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github-native

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    {{ readFile (printf ".github/releases/%s.md" .Tag) }}

    ---

homebrew_casks:
  - name: things
    binaries:
      - things
    # Run `things completions <shell>` at cask install time to drop bash/zsh/fish
    # completion scripts into the Homebrew prefix. The shell name is passed as a
    # bare positional arg (`things completions bash`) — that's Homebrew's default
    # when shell_parameter_format is omitted. Do NOT set it to `arg`: Homebrew's
    # :arg emits `--shell=bash`, which our positional CLI rejects.
    generate_completions_from_executable:
      args: [completions]
      base_name: things
      shells: [bash, zsh, fish]
    repository:
      owner: ryanlewis
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/ryanlewis/things-cli
    description: Manage your Things3 to-dos from the terminal.
    url:
      verified: github.com/ryanlewis/things-cli/
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(brew): {{ .ProjectName }} {{ .Tag }}"
    # De-quarantine in preflight (before artifact install) rather than postflight,
    # so the binary is runnable when generate_completions_from_executable invokes
    # it during install — otherwise Gatekeeper blocks the unsigned binary and no
    # completion files are written.
    hooks:
      pre:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/things"]
          end
    zap:
      trash:
        - ~/Library/Caches/things-cli
